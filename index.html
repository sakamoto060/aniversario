```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Aniversário Animado 🎉</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(120deg, #6a11cb, #2575fc);
  overflow: hidden;
  font-family: Arial;
  color: white;
  text-align: center;
}

/* BONECO */
.boneco {
  position: absolute;
  bottom: 0;
  left: -150px;
  width: 120px;
  transition: 2s;
}

.boneco img {
  width: 100%;
}

/* ENTRADA */
.boneco.entrar {
  left: 40%;
}

/* CARTA */
.carta {
  position: absolute;
  bottom: 150px;
  left: 50%;
  transform: translateX(-50%) scale(0);
  width: 250px;
  background: white;
  color: black;
  border-radius: 15px;
  padding: 20px;
  transition: 0.5s;
}

.carta.aberta {
  transform: translateX(-50%) scale(1);
}

/* TEXTO */
.msg {
  display: none;
}

.msg.mostrar {
  display: block;
}
</style>
</head>

<body>

<div class="boneco" id="boneco">
  <!-- pode trocar por outra imagem -->
  <img src="https://i.imgur.com/Qr6Y5bX.png">
</div>

<div class="carta" id="carta">
  <h2>🎉 Feliz Aniversário! 🎉</h2>
  <p class="msg" id="msg">
    Parabéns! Mais um ano sobrevivendo com sucesso 😎🎂
  </p>
</div>

<script>
// sequência animada
setTimeout(() => {
  document.getElementById("boneco").classList.add("entrar");
}, 500);

setTimeout(() => {
  document.getElementById("carta").classList.add("aberta");
}, 2500);

setTimeout(() => {
  document.getElementById("msg").classList.add("mostrar");
}, 3000);
</script>

</body>
</html>
