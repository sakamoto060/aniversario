<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Feliz Aniversário 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(120deg, #ff758c, #ff7eb3);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* ENVELOPE */
.envelope {
  position: relative;
  width: 300px;
  height: 200px;
  background: #ff4b5c;
  cursor: pointer;
  border-radius: 10px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff6b81;
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transition: 0.6s;
  transform-origin: top;
}

.letter {
  position: absolute;
  width: 90%;
  height: 90%;
  background: white;
  color: #333;
  top: 5%;
  left: 5%;
  border-radius: 10px;
  padding: 15px;
  transform: translateY(100%);
  transition: 0.6s;
  text-align: center;
  overflow: hidden;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.envelope.open .letter {
  transform: translateY(0);
}

/* FOTO POLAROID */
.polaroid {
  width: 110px;
  background: white;
  padding: 10px 10px 25px;
  margin: 10px auto;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transform: rotate(-15deg) scale(0);
  transition: 0.6s;
}

.polaroid img {
  width: 100%;
}

.envelope.open .polaroid {
  transform: rotate(-5deg) scale(1);
}

/* BOLO */
.cake {
  width: 80px;
  height: 50px;
  background: brown;
  margin: 10px auto;
  border-radius: 10px;
  position: relative;
}

.flame {
  width: 10px;
  height: 10px;
  background: orange;
  border-radius: 50%;
  position: absolute;
  top: -10px;
  left: 35px;
  animation: flame 0.5s infinite alternate;
}

@keyframes flame {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

button {
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  background: #ff4b5c;
  color: white;
  cursor: pointer;
  margin-top: 8px;
}
</style>
</head>

<body>

<!-- 🎵 Música -->
<audio id="musica" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="envelope" onclick="abrirCarta()" id="carta">
  <div class="flap"></div>

  <div class="letter">
    <h2>🎉 Feliz Aniversário, Joana! 🎉</h2>

    <!-- POLAROID -->
    <div class="polaroid">
      <img src="https://i.imgur.com/4M34hi2.png">
    </div>

    <p>Hoje é um dia especial 💖</p>

    <div class="cake">
      <div class="flame"></div>
    </div>

    <button onclick="confete(event)">🎆 Confete</button>

    <p id="msg" style="display:none;">
      Você é incrível! Nunca esqueça disso 💕
    </p>

    <button onclick="mostrar(event)">💌 Ler mensagem</button>
  </div>
</div>

<script>
let musicaTocando = false;

function abrirCarta() {
  const carta = document.getElementById("carta");
  carta.classList.toggle("open");

  // 🎵 toca música só quando abre
  if (!musicaTocando) {
    document.getElementById("musica").play();
    musicaTocando = true;
  }
}

function mostrar(e) {
  e.stopPropagation();
  document.getElementById("msg").style.display = "block";
}

function confete(e) {
  e.stopPropagation();
  for (let i = 0; i < 80; i++) {
    let c = document.createElement("div");
    c.style.position = "absolute";
    c.style.width = "8px";
    c.style.height = "8px";
    c.style.background = "yellow";
    c.style.top = "0";
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.animation = "fall 3s linear";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3000);
  }
}

const style = document.createElement('style');
style.innerHTML = `
@keyframes fall {
  to { transform: translateY(100vh) rotate(360deg); }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
